<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<section class="vh-100 d-flex align-items-center">
  <div class="container-fluid h-100">
    <div class="row h-100">

      <div class="col-sm-6 d-flex flex-column justify-content-center text-black px-5">

        <h1 class="fw-bold mb-4 text-center">
          Galería de Imágenes Díaz Desarrolladores
        </h1>

        <form id="formLogin" class="mx-auto" style="width: 23rem;">

          <h3 class="fw-normal mb-4 text-center">Iniciar Sesión</h3>

          <div class="form-outline mb-4">
            <input type="email" id="email" class="form-control form-control-lg" required />
            <label class="form-label" for="email">Correo electrónico</label>
          </div>

          <div class="form-outline mb-4">
            <input type="password" id="password" class="form-control form-control-lg" required />
            <label class="form-label" for="password">Contraseña</label>
          </div>

          <button class="btn btn-info btn-lg w-100" type="submit">
            INICIAR SESIÓN
          </button>

        </form>

      </div>

      <div class="col-sm-6 px-0 d-none d-sm-block">
        <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-login-form/img3.webp"
          alt="Login image" class="w-100 vh-100"
          style="object-fit: cover; object-position: left;">
      </div>

    </div>
  </div>
</section>


<script src="js/login.js"></script>

</body>
</html>
