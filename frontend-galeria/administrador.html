<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Administrador</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="container py-5">

  <h2 class="text-center mb-4">📤 Subir Imagen (Administrador)</h2>

  <button class="btn btn-danger mb-4" onclick="localStorage.removeItem('token'); window.location.href='index.html';">
    Cerrar sesión
  </button>

  <form id="formSubir" enctype="multipart/form-data">
    <input type="text" name="titulo" class="form-control mb-3" placeholder="Título" required />
    <input type="text" name="autor" class="form-control mb-3" placeholder="Autor" required />
    <textarea name="descripcion" class="form-control mb-3" placeholder="Descripción" required></textarea>
    <select name="categoria" class="form-control mb-3" required>
      <option value="">Selecciona categoría</option>
      <option value="Paisajes">Paisajes</option>
      <option value="Personas">Personas</option>
      <option value="Animales">Animales</option>
      <option value="Arte Digital">Arte Digital</option>
      <option value="Arquitectura">Arquitectura</option>
    </select>

    <input type="file" name="imagen" class="form-control mb-3" accept="image/*" required />

    <button class="btn btn-success w-100">Subir Imagen</button>
  </form>

  <script src="js/administrador.js"></script>
</body>

</html>
